name: Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
  schedule:
    - cron: "10 4 * * 2" # Every Tuesday at 4:10 AM UTC

permissions:
  contents: read

jobs:
  tests:
    name: Pimcore ${{ matrix.pimcore-version }} / PHP ${{ matrix.php-version }} / PHPUnit ${{ matrix.phpunit-version }} / ${{ matrix.dependencies }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php-version: [ "8.1", "8.2", "8.3", "8.4" ]
        pimcore-version: [ "^11.5", "^12.0" ]
        phpunit-version: [ "^9.6", "^10.5" ]
        dependencies: [ "highest" ]
        exclude:
          - php-version: "8.1"
            pimcore-version: "^12.0"
          - php-version: "8.2"
            pimcore-version: "^12.0"
          - php-version: "8.4"
            pimcore-version: "^11.5"
        include:
          - php-version: "8.1"
            pimcore-version: "^11.5"
            phpunit-version: "^9.6"
            dependencies: "lowest"
          - php-version: "8.1"
            pimcore-version: "^11.5"
            phpunit-version: "^10.5"
            dependencies: "lowest"
          - php-version: "8.3"
            pimcore-version: "^12.0"
            phpunit-version: "^9.6"
            dependencies: "lowest"
          - php-version: "8.3"
            pimcore-version: "^12.0"
            phpunit-version: "^10.5"
            dependencies: "lowest"

    env:
      MYSQL_HOST: 127.0.0.1
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: pimcore
      MYSQL_DATABASE: pimcore
      MYSQL_SERVER_VERSION: "10.11.10-MariaDB"

    services:
      mariadb:
        image: mariadb:10.11.10
        env:
          MYSQL_ROOT_PASSWORD: pimcore
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        ports:
          - 3306:3306

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          ini-file: development

      - name: Require test dependencies
        run: |
          packages="pimcore/pimcore:${{ matrix.pimcore-version }} phpunit/phpunit:${{ matrix.phpunit-version }}"

          if [ "${{ matrix.pimcore-version }}" = "^11.5" ] && [ "${{ matrix.dependencies }}" = "lowest" ]; then
            packages="$packages dereuromark/composer-prefer-lowest"
          fi

          composer require --no-update $packages

      - name: Install dependencies
        uses: ramsey/composer-install@v4
        with:
          dependency-versions: ${{ matrix.dependencies }}

      - name: Validate lowest dependencies
        if: matrix.pimcore-version == '^11.5' && matrix.dependencies == 'lowest'
        run: |
          vendor/bin/validate-prefer-lowest

      - name: Run PHPUnit
        env:
          PIMCORE_ENCRYPTION_SECRET: ${{ secrets.PIMCORE_ENCRYPTION_SECRET }}
          PIMCORE_INSTANCE_IDENTIFIER: ${{ secrets.PIMCORE_INSTANCE_IDENTIFIER }}
          PIMCORE_PRODUCT_KEY: ${{ secrets.PIMCORE_PRODUCT_KEY }}
        run: |
          if [ "${{ matrix.dependencies }}" = "lowest" ]; then
            export SYMFONY_DEPRECATIONS_HELPER=disabled
          fi

          if [ "${{ matrix.phpunit-version }}" = "^9.6" ]; then
            CONFIG="--configuration phpunit9.xml.dist"
          fi

          composer tests -- ${CONFIG:-}
